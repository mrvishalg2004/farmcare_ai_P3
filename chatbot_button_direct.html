<!-- chatbot_button.html -->
<!DOCTYPE html>
<html>
<head>
    <style>
        #floating-chatbot-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }
        
        #floating-chatbot-button {
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 20px;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Arial', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            display: block;
        }
        
        #floating-chatbot-button:hover {
            background-color: #3e8e41;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            #floating-chatbot-button {
                padding: 10px 16px;
                font-size: 14px;
            }
            
            #floating-chatbot-container {
                bottom: 15px;
                right: 15px;
            }
        }
        
        @media (max-width: 480px) {
            #floating-chatbot-button {
                padding: 8px 12px;
                font-size: 12px;
            }
            
            #floating-chatbot-container {
                bottom: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="floating-chatbot-container">
        <a id="floating-chatbot-button" href="https://farmcareaichatbot.vercel.app/" target="_blank">
            Chat with AI 🤖
        </a>
    </div>
</body>
</html>
